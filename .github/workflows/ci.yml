name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages and apps
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Audit Sigil package surface
        run: pnpm audit:sigil

      - name: Audit preset contrast
        run: pnpm audit:contrast

      - name: Smoke test create-sigil-app golden path
        run: pnpm smoke:create-app

  package-smoke:
    name: Package Smoke
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        package:
          - packages/tokens
          - packages/primitives
          - packages/components
          - packages/presets
          - packages/cli
          - packages/create-sigil-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build target package
        run: pnpm --filter ./${{ matrix.package }}... build

      - name: Verify npm package contents
        working-directory: ${{ matrix.package }}
        run: npm pack --dry-run
