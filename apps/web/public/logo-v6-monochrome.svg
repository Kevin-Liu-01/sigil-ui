<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- 3-column divider (two vertical lines) -->
  <line x1="40" y1="4" x2="40" y2="116" stroke="currentColor" stroke-width="0.25" stroke-dasharray="2 2"/>
  <line x1="80" y1="4" x2="80" y2="116" stroke="currentColor" stroke-width="0.25" stroke-dasharray="2 2"/>

  <!-- Left column -->
  <circle cx="20" cy="28" r="10" stroke="currentColor" stroke-width="0.25" stroke-dasharray="2 2" opacity="1"/>
  <circle cx="20" cy="52" r="8" stroke="currentColor" stroke-width="0.25" stroke-dasharray="2 2" opacity="0.6"/>
  <circle cx="20" cy="90" r="14" stroke="currentColor" stroke-width="0.25" stroke-dasharray="2 2" opacity="0.35"/>

  <!-- Center column -->
  <circle cx="60" cy="20" r="12" stroke="currentColor" stroke-width="0.25" stroke-dasharray="2 2" opacity="0.85"/>
  <circle cx="60" cy="60" r="16" stroke="currentColor" stroke-width="0.25" stroke-dasharray="2 2" opacity="0.5"/>
  <circle cx="60" cy="60" r="22" stroke="currentColor" stroke-width="0.25" stroke-dasharray="1.5 3" opacity="0.25"/>
  <circle cx="60" cy="100" r="8" stroke="currentColor" stroke-width="0.25" stroke-dasharray="2 2" opacity="0.7"/>

  <!-- Right column -->
  <circle cx="100" cy="36" r="8" stroke="currentColor" stroke-width="0.25" stroke-dasharray="2 2" opacity="0.65"/>
  <circle cx="100" cy="76" r="12" stroke="currentColor" stroke-width="0.25" stroke-dasharray="2 2" opacity="0.8"/>
</svg>
