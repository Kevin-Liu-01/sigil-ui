<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- X divider -->
  <line x1="10" y1="10" x2="110" y2="110" stroke="currentColor" stroke-width="0.25" stroke-dasharray="2 2"/>
  <line x1="110" y1="10" x2="10" y2="110" stroke="currentColor" stroke-width="0.25" stroke-dasharray="2 2"/>

  <!-- Top wedge: squares -->
  <rect x="46" y="14" width="12" height="12" stroke="#c7d2fe" stroke-width="0.25" stroke-dasharray="2 2"/>
  <rect x="62" y="14" width="12" height="12" stroke="#a5b4fc" stroke-width="0.25" stroke-dasharray="2 2"/>
  <rect x="54" y="30" width="12" height="12" stroke="#6366f1" stroke-width="0.25" stroke-dasharray="2 2"/>

  <!-- Right wedge: diamonds -->
  <rect x="86" y="50" width="12" height="12" stroke="#ea580c" stroke-width="0.25" stroke-dasharray="2 2" transform="rotate(45 92 56)"/>
  <rect x="94" y="62" width="10" height="10" stroke="#f97316" stroke-width="0.25" stroke-dasharray="2 2" transform="rotate(45 99 67)"/>

  <!-- Bottom wedge: hexagon + inner -->
  <polygon points="60,82 74,90 74,106 60,114 46,106 46,90" stroke="#d946ef" stroke-width="0.25" stroke-dasharray="2 2"/>
  <polygon points="60,88 68,93 68,103 60,108 52,103 52,93" stroke="#f0abfc" stroke-width="0.25" stroke-dasharray="2 2"/>

  <!-- Left wedge: triangles -->
  <polygon points="30,52 38,66 22,66" stroke="#22c55e" stroke-width="0.25" stroke-dasharray="2 2"/>
  <polygon points="18,56 22,64 14,64" stroke="#16a34a" stroke-width="0.25" stroke-dasharray="2 2"/>
</svg>
