<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Plus divider -->
  <line x1="60" y1="4" x2="60" y2="116" stroke="currentColor" stroke-width="2"/>
  <line x1="4" y1="60" x2="116" y2="60" stroke="currentColor" stroke-width="2"/>

  <!-- Top-left: 4 small SQUARES (token blocks) -->
  <rect x="14" y="14" width="16" height="16" fill="#9b99e8"/>
  <rect x="34" y="14" width="16" height="16" fill="#6366f1"/>
  <rect x="14" y="34" width="16" height="16" fill="#a78bfa"/>
  <rect x="34" y="34" width="16" height="16" fill="#4f46e5"/>

  <!-- Top-right: 2 DIAMONDS -->
  <rect x="72" y="20" width="14" height="14" fill="#ea580c" transform="rotate(45 79 27)"/>
  <rect x="92" y="32" width="11" height="11" fill="#f97316" transform="rotate(45 97.5 37.5)"/>

  <!-- Bottom-left: 3 TRIANGLES -->
