<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Plus divider (clean, medium) -->
  <line x1="60" y1="2" x2="60" y2="118" stroke="currentColor" stroke-width="2"/>
  <line x1="2" y1="60" x2="118" y2="60" stroke="currentColor" stroke-width="2"/>

  <!-- Top-left: Dense cluster of 5 small dots -->
  <circle cx="18" cy="18" r="7" fill="#9b99e8"/>
  <circle cx="36" cy="16" r="6" fill="#7c7ce0"/>
  <circle cx="48" cy="28" r="5" fill="#6366f1"/>
  <circle cx="22" cy="38" r="8" fill="#a78bfa"/>
  <circle cx="42" cy="46" r="4" fill="#4f46e5"/>

  <!-- Top-right: Single large circle, off-center -->
  <circle cx="92" cy="30" r="20" fill="#ea580c"/>

  <!-- Bottom-left: 2 medium circles, stacked -->
  <circle cx="28" cy="78" r="10" fill="#22c55e"/>
  <circle cx="40" cy="100" r="13" fill="#059669"/>

  <!-- Bottom-right: 3 descending dots, diagonal -->
  <circle cx="74" cy="74" r="14" fill="#d946ef"/>
  <circle cx="94" cy="88" r="10" fill="#ec4899"/>
  <circle cx="106" cy="104" r="7" fill="#f472b6"/>
</svg>
