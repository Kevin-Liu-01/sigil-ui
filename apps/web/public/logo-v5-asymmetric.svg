  <line x1="60" y1="60" x2="11.5" y2="88" stroke="currentColor" stroke-width="0.25" stroke-dasharray="2 2"/>
  <line x1="60" y1="60" x2="108.5" y2="88" stroke="currentColor" stroke-width="0.25" stroke-dasharray="2 2"/>

  <!-- Top sector -->
  <circle cx="40" cy="20" r="10" stroke="#c7d2fe" stroke-width="0.25" stroke-dasharray="2 2"/>
  <circle cx="40" cy="20" r="15" stroke="#c7d2fe" stroke-width="0.25" stroke-dasharray="1.5 2.5" opacity="0.4"/>
  <circle cx="80" cy="20" r="8" stroke="#a5b4fc" stroke-width="0.25" stroke-dasharray="2 2"/>
  <circle cx="60" cy="36" r="6" stroke="#818cf8" stroke-width="0.25" stroke-dasharray="2 2"/>

  <!-- Bottom-left sector -->
  <circle cx="24" cy="86" r="12" stroke="#22c55e" stroke-width="0.25" stroke-dasharray="2 2"/>
  <circle cx="40" cy="100" r="8" stroke="#16a34a" stroke-width="0.25" stroke-dasharray="2 2"/>

  <!-- Bottom-right sector -->
  <circle cx="90" cy="82" r="14" stroke="#d946ef" stroke-width="0.25" stroke-dasharray="2 2"/>
  <circle cx="90" cy="82" r="20" stroke="#d946ef" stroke-width="0.25" stroke-dasharray="1 4" opacity="0.35"/>
  <circle cx="100" cy="100" r="6" stroke="#ea580c" stroke-width="0.25" stroke-dasharray="2 2"/>
